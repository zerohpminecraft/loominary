# Publishes every v* tag to Modrinth: builds the jar and uploads it as a new
# version (changelog = that version's section of CHANGELOG.md).
# NOTE: kept separate from modrinth-readme.yml because a paths: filter silently
# excludes tag pushes (tags have no computed file changes).
# Requires the MODRINTH_KEY repo secret.
name: modrinth-publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to (re)publish'
        required: true

env:
  MODRINTH_PROJECT: loominary

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Gather version info
        id: info
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "MC_VERSION=$(grep -oP '^minecraft_version=\K.*' gradle.properties)" >> "$GITHUB_OUTPUT"
          # Extract this version's section from CHANGELOG.md (from its "## v<ver>"
          # heading up to the next "## " heading).
          awk -v ver="${TAG#v}" '
            $0 == "## v" ver { grab = 1; next }
            grab && /^## /   { exit }
            grab             { print }
          ' CHANGELOG.md > build/changelog.md
          if [ ! -s build/changelog.md ]; then
            echo "See CHANGELOG.md for details." > build/changelog.md
          fi

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_PROJECT }}
          modrinth-token: ${{ secrets.MODRINTH_KEY }}
          files: build/libs/loominary-${{ steps.info.outputs.VERSION }}.jar
          name: v${{ steps.info.outputs.VERSION }}
          version: ${{ steps.info.outputs.VERSION }}
          version-type: release
          changelog-file: build/changelog.md
          loaders: fabric
          game-versions: ${{ steps.info.outputs.MC_VERSION }}
          dependencies: |
            fabric-api(required)
            litematica(optional)

