# Mirrors docs/wiki/ to the GitHub Wiki (<repo>.wiki.git) on every push to master
# that touches it. The wiki repo must exist first — create any page once in the
# GitHub UI before the first run. Requires Actions "Read and write permissions"
# (Settings → Actions → General → Workflow permissions).
name: Sync wiki

on:
  push:
    branches: [master]
    paths: ['docs/wiki/**', '.github/workflows/wiki.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs/wiki → wiki repo
        run: |
          if ! git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki 2>/dev/null; then
            echo "::error title=Wiki not initialized::GitHub only creates the wiki git repo after the first page is saved in the web UI. Open https://github.com/${{ github.repository }}/wiki, click 'Create the first page', save anything, then re-run this workflow — the sync will overwrite it with docs/wiki/."
            exit 1
          fi
          rsync -a --delete --exclude .git docs/wiki/ /tmp/wiki/
          cd /tmp/wiki
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "docs sync from ${GITHUB_SHA::8}"; git push; }
