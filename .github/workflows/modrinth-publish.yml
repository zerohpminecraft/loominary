# Publishes every v* tag to Modrinth: builds the jar and uploads it as a new
# version (changelog = that version's section of CHANGELOG.md).
# NOTE: kept separate from modrinth-readme.yml because a paths: filter silently
# excludes tag pushes (tags have no computed file changes).
# Requires the MODRINTH_KEY repo secret.
name: modrinth-publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to (re)publish'
        required: true

env:
  MODRINTH_PROJECT: loominary

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Gather version info
        id: info
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "MC_VERSION=$(grep -oP '^minecraft_version=\K.*' gradle.properties)" >> "$GITHUB_OUTPUT"
          # Extract this version's section from CHANGELOG.md (from its "## v<ver>"
          # heading up to the next "## " heading).
          awk -v ver="${TAG#v}" '
            $0 == "## v" ver { grab = 1; next }
            grab && /^## /   { exit }
            grab             { print }
          ' CHANGELOG.md > build/changelog.md
          if [ ! -s build/changelog.md ]; then
            echo "See CHANGELOG.md for details." > build/changelog.md
          fi

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_PROJECT }}
          modrinth-token: ${{ secrets.MODRINTH_KEY }}
          files: build/libs/loominary-${{ steps.info.outputs.VERSION }}.jar
          name: v${{ steps.info.outputs.VERSION }}
          version: ${{ steps.info.outputs.VERSION }}
          version-type: release
          changelog-file: build/changelog.md
          loaders: fabric
          game-versions: ${{ steps.info.outputs.MC_VERSION }}
          dependencies: |
            fabric-api(required)
            litematica(optional)

      # Side metadata is project-level and mc-publish cannot set it; without
      # client-side-only environment metadata Modrinth rejects the mod in review.
      # modrinth-readme.yml enforces the same thing on master pushes — this keeps
      # releases self-healing even if that workflow hasn't run.
      - name: Enforce client-side-only environment metadata
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          req = urllib.request.Request(
              f"https://api.modrinth.com/v2/project/{os.environ['MODRINTH_PROJECT']}",
              data=json.dumps({'client_side': 'required',
                               'server_side': 'unsupported'}).encode(),
              headers={
                  'Authorization': os.environ['MODRINTH_KEY'],
                  'Content-Type': 'application/json',
                  'User-Agent': 'zerohpminecraft/loominary publish',
              },
              method='PATCH')
          with urllib.request.urlopen(req) as resp:
              print('Modrinth responded', resp.status)
          EOF
        env:
          MODRINTH_KEY: ${{ secrets.MODRINTH_KEY }}

