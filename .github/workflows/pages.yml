name: deploy-pages

# Builds the web editor (web/) and publishes it to GitHub Pages at
# https://zerohpminecraft.github.io/loominary/ .
#
# Deploys from master (the integration branch). Runs only when the web editor
# or this workflow changes, plus on manual dispatch.
on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Build with Vite directly (esbuild). We intentionally skip the `tsc` step
      # in `npm run build`: the project carries known type-only errors that don't
      # affect the emitted bundle.
      #
      # Umami analytics config is injected from repo Variables (Settings →
      # Secrets and variables → Actions → Variables). These values are public
      # (they appear in the page source), so Variables — not Secrets — is correct.
      # If unset, analytics simply stays disabled in the build.
      - run: npx vite build
        env:
          VITE_UMAMI_SRC: ${{ vars.UMAMI_SRC }}
          VITE_UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
