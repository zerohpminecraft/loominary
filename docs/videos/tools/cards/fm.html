<link rel="stylesheet" href="card.css">
<style>
  body { justify-content: center; }
  .fm {
    width: 1500px; height: 860px; background: #10182c; border: 1px solid #24304e;
    border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
    font-size: 30px; text-align: left; box-shadow: 0 30px 80px #000a;
  }
  .titlebar { background: #182339; padding: 16px 28px; color: #9fb0cc; font-size: 26px;
              display: flex; gap: 14px; align-items: center; }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: #2c3a5c; }
  .body { flex: 1; display: flex; }
  .side { width: 420px; background: #131c31; padding: 24px 0; border-right: 1px solid #24304e; }
  .side .item { padding: 12px 34px; color: #8fa2c4; }
  .side .item.sub { padding-left: 70px; }
  .side .item.target { border-radius: 8px; margin: 0 12px; padding-left: 58px; }
  .side .item.target.hot { background: #1b3556; color: #a8d2ff; outline: 2px solid #4a9eff; }
  .main { flex: 1; padding: 30px 40px; position: relative; }
  .crumb { color: #64769a; font-size: 26px; margin-bottom: 26px; }
  .file { display: flex; align-items: center; gap: 18px; padding: 14px 18px; border-radius: 10px;
          color: #cdd8ec; margin-bottom: 6px; width: fit-content; }
  .file.sel { background: #1b3556; outline: 2px solid #4a9eff; }
  .file .ico { width: 34px; height: 40px; border-radius: 6px; background: #2b3b61;
               display: flex; align-items: center; justify-content: center; font-size: 20px; color: #a8d2ff; }
  .ghost { position: fixed; pointer-events: none; opacity: 0.92; z-index: 5;
           transition: transform 1.6s cubic-bezier(.5,.05,.4,1); }
  .ghost .file { background: #1b3556; outline: 2px solid #4a9eff; margin-bottom: 4px; }
  .badge { position: absolute; top: -14px; right: -14px; background: #4a9eff; color: #06101f;
           border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center;
           justify-content: center; font-weight: bold; }
</style>
<div class="fm">
  <div class="titlebar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span id="title">Files</span></div>
  <div class="body">
    <div class="side" id="side"></div>
    <div class="main">
      <div class="crumb" id="crumb"></div>
      <div id="list"></div>
    </div>
  </div>
</div>
<script>
const scene = new URLSearchParams(location.search).get('scene') || 'install';
const JAR = n => ({ n, i: 'JAR' });
const SCENES = {
  install: {
    title: 'Downloads', crumb: '~/Downloads',
    files: [JAR('loominary-2.1.1.jar'), JAR('fabric-api-0.119.4+1.21.4.jar'), JAR('litematica-fabric-1.21.4.jar')],
    side: [['.minecraft', 0], ['mods', 1, 'target'], ['config', 1], ['schematics', 1]],
    moves: [{ files: [0, 1, 2], target: 'mods' }],
  },
  files: {
    title: 'loominary-export.zip', crumb: '~/Downloads/loominary-export',
    files: [{ n: 'loominary_state.json', i: '{ }' }, { n: 'sunset-1x1.litematic', i: 'NBT' }, { n: 'preview.png', i: 'PNG' }],
    side: [['.minecraft', 0], ['mods', 1], ['config', 1, 'target'], ['schematics', 1, 'target']],
    moves: [{ files: [0], target: 'config' }, { files: [1], target: 'schematics' }],
  },
};
const S = SCENES[scene];
document.getElementById('title').textContent = S.title;
document.getElementById('crumb').textContent = S.crumb;
const side = document.getElementById('side');
for (const [name, depth, t] of S.side) {
  const d = document.createElement('div');
  d.className = 'item' + (depth ? ' sub' : '') + (t ? ' target' : '');
  d.textContent = (depth ? '📁 ' : '🗂 ') + name;
  d.dataset.name = name;
  side.appendChild(d);
}
const list = document.getElementById('list');
for (const f of S.files) {
  const d = document.createElement('div');
  d.className = 'file';
  d.innerHTML = `<span class="ico">${f.i}</span>${f.n}`;
  list.appendChild(d);
}
const sleep = ms => new Promise(r => setTimeout(r, ms));
(async () => {
  await sleep(1400);
  for (const mv of S.moves) {
    const rows = mv.files.map(i => list.children[i]);
    for (const r of rows) { r.classList.add('sel'); await sleep(450); }
    await sleep(600);
    // Ghost stack flies to the sidebar target.
    const ghost = document.createElement('div');
    ghost.className = 'ghost';
    const r0 = rows[0].getBoundingClientRect();
    ghost.style.left = r0.left + 'px'; ghost.style.top = r0.top + 'px';
    for (const r of rows) ghost.appendChild(r.cloneNode(true));
    if (rows.length > 1) {
      const b = document.createElement('div'); b.className = 'badge'; b.textContent = rows.length;
      ghost.style.position = 'fixed'; ghost.appendChild(b);
    }
    document.body.appendChild(ghost);
    const tgt = [...side.children].find(d => d.dataset.name === mv.target);
    tgt.classList.add('hot');
    const tr = tgt.getBoundingClientRect();
    await sleep(80);
    ghost.style.transform = `translate(${tr.left - r0.left + 40}px, ${tr.top - r0.top - 6}px) scale(0.45)`;
    await sleep(1750);
    ghost.remove();
    for (const r of rows) r.style.opacity = 0.28;
    await sleep(500);
    tgt.classList.remove('hot');
    await sleep(400);
  }
  document.title = 'done';
})();
</script>
